id = "rainwater-procedural"
title = "Collecting rainwater — held by the lower wall"
register = "procedural"
problem = "Heights are columns. How many cells of water are trapped between them after rain?"
author = "GlassBox"
created = "2026-06-26"

source = """
heights = [3, 0, 2, 0, 4]
n = len(heights)
left = [0] * n
right = [0] * n
m = 0
for i in range(n):
    if heights[i] > m:
        m = heights[i]
    left[i] = m
m = 0
for i in range(n - 1, -1, -1):
    if heights[i] > m:
        m = heights[i]
    right[i] = m
water = [0] * n
total = 0
for i in range(n):
    fill = min(left[i], right[i]) - heights[i]
    if fill > 0:
        water[i] = fill
        total = total + fill
"""

[abstraction]
type = "water"

[abstraction.bind]
heights = "heights"
water = "water"
i = "current_index"
total = "total"


[[notes]]
step = 44
text = "For each column, the water it holds is min(tallest-on-left, tallest-on-right) − its own height — the lower wall sets the limit."

[[notes]]
step = 49
text = "Column 1 (height 0) sits between walls of 3 and 4, so it holds min(3, 4) − 0 = 3."

[[notes]]
step = 62
text = "Column 4 is the right edge (height 4): min(4, 4) − 4 = 0, so it correctly holds nothing."

[[notes]]
step = 64
text = "total = 7, water = [0, 3, 1, 3, 0]. Bounded by the lower wall on each side, the edges stay dry."
