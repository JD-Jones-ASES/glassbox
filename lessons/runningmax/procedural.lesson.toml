id = "runningmax-procedural"
title = "Running maximum — seeded at the first value"
register = "procedural"
problem = "Track the largest number seen so far as you walk the list."
author = "GlassBox"
created = "2026-06-26"

source = """
nums = [-5, -2, -8, -1]
max_so_far = nums[0]
for n in nums:
    if n > max_so_far:
        max_so_far = n
"""

[abstraction]
type = "piles"

[abstraction.bind]
nums = "source"
n = "cursor"


[[checkpoints]]
step = 5
ask = "n is -2 and max_so_far is -5. After the if checks n > max_so_far, what will max_so_far be?"

[[notes]]
step = 1
text = "Seeded at the first element (-5), so a real value is always the baseline — even when everything is negative."

[[notes]]
step = 12
text = "max_so_far ends at -1, the true largest. Seeding from the data, not a guess, is what makes it robust."
