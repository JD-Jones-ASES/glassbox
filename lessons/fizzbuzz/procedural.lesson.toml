id = "fizzbuzz-procedural"
title = "FizzBuzz — test the strictest case first"
register = "procedural"
problem = "For 1 to 15, say Fizz for multiples of 3, Buzz for multiples of 5, FizzBuzz for both, else the number."
author = "GlassBox"
created = "2026-06-26"

source = """
result = []
for i in range(1, 16):
    if i % 3 == 0 and i % 5 == 0:
        result.append("FizzBuzz")
    elif i % 3 == 0:
        result.append("Fizz")
    elif i % 5 == 0:
        result.append("Buzz")
    else:
        result.append(str(i))
"""

[[checkpoints]]
step = 68
ask = "15 is divisible by both 3 and 5, and this ladder tests that case first. What will it append for 15?"

[[notes]]
step = 69
text = "Because the strictest test (divisible by both) comes first, 15 correctly gets 'FizzBuzz'."

[[notes]]
step = 70
text = "Result is right end to end. The fix wasn't the conditions — it was their order."
