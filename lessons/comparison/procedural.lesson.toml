id = "comparison-procedural"
title = ">= includes the boundary"
register = "procedural"
problem = "Decide whether someone aged 18 counts as an adult (18 or older) and store the yes/no answer."
author = "GlassBox"
created = "2026-06-26"

source = """
age = 18
is_adult = age >= 18
"""

[[checkpoints]]
step = 0
ask = "age is 18. After `is_adult = age >= 18` runs, what will is_adult be?"

[[notes]]
step = 1
text = "is_adult = (18 >= 18) = True. `>=` includes the boundary. The stored value is a bool — a comparison is a yes/no value you can keep and reuse."
