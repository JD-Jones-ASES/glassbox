id = "arithmetic-procedural"
title = "Parentheses force the order"
register = "procedural"
problem = "Add base (2) and extra (3), then multiply the sum by 4 (we want 20)."
author = "GlassBox"
created = "2026-06-26"

source = """
base = 2
extra = 3
result = (base + extra) * 4
"""

[[checkpoints]]
step = 1
ask = "After `result = (base + extra) * 4` runs, what will result be?"

[[notes]]
step = 2
text = "result = (2 + 3) * 4 = 20. The parentheses force the addition first. When the order matters, spell it out with brackets."
